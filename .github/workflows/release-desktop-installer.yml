name: Release Desktop Installer

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload installer to (for example: v1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and Upload macOS Installer
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Resolve target tag
        id: target_tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.target_tag.outputs.value }}

      - name: Checkout build assets from main
        uses: actions/checkout@v6
        with:
          ref: main
          path: __main
          sparse-checkout: resources
          sparse-checkout-cone-mode: true

      - name: Ensure installer assets exist
        run: |
          # New tags use resources/icon.icns; old tags may use build/icon.icns.
          CONFIGURED_ICON=$(node -p "try{require('./package.json').build.mac.icon}catch{''}")
          if [ -z "$CONFIGURED_ICON" ]; then
            CONFIGURED_ICON="resources/icon.icns"
          fi
          CONFIGURED_BG=$(node -p "try{require('./package.json').build.dmg.background}catch{''}")
          if [ -z "$CONFIGURED_BG" ]; then
            CONFIGURED_BG="resources/dmg-background.png"
          fi

          if [ -f "$CONFIGURED_ICON" ]; then
            echo "Using icon from tag at $CONFIGURED_ICON"
          else
            ICON_SRC="__main/resources/icon.icns"
            if [ ! -f "$ICON_SRC" ]; then
              echo "::error::resources/icon.icns not found on main"
              exit 1
            fi
            mkdir -p "$(dirname "$CONFIGURED_ICON")"
            cp "$ICON_SRC" "$CONFIGURED_ICON"
            echo "Backfilled icon from main at $CONFIGURED_ICON"
          fi

          if [ -f "$CONFIGURED_BG" ]; then
            echo "Using DMG background from tag at $CONFIGURED_BG"
          else
            BG_SRC="__main/resources/dmg-background.png"
            if [ ! -f "$BG_SRC" ]; then
              echo "::error::resources/dmg-background.png not found on main"
              exit 1
            fi
            mkdir -p "$(dirname "$CONFIGURED_BG")"
            cp "$BG_SRC" "$CONFIGURED_BG"
            echo "Backfilled DMG background from main at $CONFIGURED_BG"
          fi
          rm -rf __main

      - name: Derive version from tag
        env:
          TAG: ${{ steps.target_tag.outputs.value }}
        run: |
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Aligning package.json version $PKG_VERSION → $TAG_VERSION"
            npm version "$TAG_VERSION" --no-git-tag-version
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import signing certificate
        if: env.CSC_LINK != ''
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: echo "Certificate imported via electron-builder CSC_LINK"

      - name: Build DMG installer
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm exec electron-vite build && pnpm exec electron-builder --mac dmg --publish never

      - name: Verify installer artifact
        run: |
          ls -lah release
          test -n "$(find release -maxdepth 1 -name '*.dmg' -print -quit)"
          test -f "release/latest-mac.yml"
          test -n "$(find release -maxdepth 1 -name '*.dmg.blockmap' -print -quit)"

      - name: Upload installer and update metadata to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ASSETS=()
          while IFS= read -r -d '' file; do
            ASSETS+=("$file")
          done < <(find release -maxdepth 1 \( -name '*.dmg' -o -name '*.dmg.blockmap' -o -name 'latest-mac.yml' \) -print0)
          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "::error::No release assets found to upload"
            exit 1
          fi
          gh release upload "${{ steps.target_tag.outputs.value }}" "${ASSETS[@]}" --clobber
